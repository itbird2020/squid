# ===================== 基础配置（适配Pod+Docker） =====================
http_port 0.0.0.0:3128
cache_effective_user squid
cache_effective_group squid

# ===================== 缓存配置（7.4 兼容版） =====================
cache_mem 128 MB
maximum_object_size_in_memory 16 MB
# 核心修改：删除noatime（7.4不支持）
cache_dir ufs /var/spool/squid 512 16 256
coredump_dir /tmp/squid-coredump
maximum_object_size 100 MB
minimum_object_size 0 KB
# 7.4 兼容的缓存策略
cache_replacement_policy lfuda
memory_replacement_policy gdsf

# ===================== Header透传 + 隐藏真实IP（核心） =====================
request_header_access Authorization allow all
request_header_access Custom-Header allow all
request_header_access Range allow all
request_header_access User-Agent allow all
request_header_access Referer allow all

request_header_access X-Forwarded-For deny all
request_header_access X-Real-IP deny all
request_header_access Via deny all
request_header_access Proxy-Connection deny all
request_header_access X-Proxy-ID deny all
forwarded_for off
header_replace X-Forwarded-For $server_addr
reply_header_access X-Cache deny all
reply_header_access X-Cache-Lookup deny all
reply_header_access Server deny all
reply_header_access Via deny all

# ===================== Range分段请求（图片下载必备） =====================
range_offset_limit none
cache allow all
# 核心修改：删除partial_http_requests（7.4不支持）

# ===================== 访问控制（安全强化） =====================
acl SSL_ports port 443
acl Safe_ports port 80 443 8080 8443
http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports
http_access allow all
http_access deny all

# ===================== 网络优化（适配Pod DNS） =====================
dns_nameservers /etc/resolv.conf 223.5.5.5 223.6.6.6
dns_timeout 8 seconds
connect_timeout 15 seconds
read_timeout 60 seconds
request_timeout 30 seconds
client_lifetime 3600 seconds
ssl_unclean_shutdown on
ssl_bump none

# ===================== 日志配置（Docker/Pod 易排查） =====================
access_log stdio:/dev/stdout squid
cache_log stdio:/dev/stdout
cache_store_log stdio:/dev/stdout
logfile_rotate 0
debug_options ALL,1
logformat combined "%h %l %u %t \"%r\" %>s %b \"%{Referer}i\" \"%{User-Agent}i\""
access_log stdio:/dev/stdout combined

# ===================== Docker/Pod 特有优化（7.4 兼容） =====================
daemon off
pid_filename none
max_filedescriptors 65535
# 核心修改：删除ftpSupport/gopherSupport/sslcrtd_program（7.4语法不兼容）

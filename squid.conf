# ===================== 基础配置（适配Pod+Docker） =====================
# 核心优化：绑定0.0.0.0（Docker/Pod内必须，否则外部无法访问）
http_port 0.0.0.0:3128
# 禁用IPv6（Pod/Docker内大概率用不到，避免启动警告）
http_port ::1:3128 disable
cache_effective_user squid
cache_effective_group squid

# ===================== 缓存配置（Pod资源优化+稳定性） =====================
# 核心优化：根据Pod内存调整（64M偏小，建议128M；同时限制最大使用）
cache_mem 128 MB
maximum_object_size_in_memory 16 MB  # 内存只缓存小文件，减少内存占用
# 核心优化：缓存目录添加noatime（提升IO性能，Docker挂载目录必备）
cache_dir ufs /var/spool/squid 512 16 256 noatime
# 核心优化：coredump目录改为/tmp（Pod内/var/log可能无写入权限）
coredump_dir /tmp/squid-coredump
# 优化：缓存大文件阈值（避免缓存超大文件占满磁盘）
maximum_object_size 100 MB
minimum_object_size 0 KB
# 优化：缓存过期策略（适配动态内容）
cache_replacement_policy heap LFUDA
memory_replacement_policy heap GDSF

# ===================== Header透传 + 隐藏真实IP（核心强化） =====================
# 保留原有透传逻辑
request_header_access Authorization allow all
request_header_access Custom-Header allow all
request_header_access Range allow all
request_header_access User-Agent allow all
request_header_access Referer allow all

# 核心强化：彻底清理溯源Header
request_header_access X-Forwarded-For deny all
request_header_access X-Real-IP deny all
request_header_access Via deny all
request_header_access Proxy-Connection deny all  # 新增：隐藏代理连接标识
request_header_access X-Proxy-ID deny all       # 新增：通用代理标识
forwarded_for off                               # 禁用XFF头自动生成
header_replace X-Forwarded-For $server_addr     # 替换为代理IP（而非真实客户端）
# 核心强化：清理响应头的缓存标识
reply_header_access X-Cache deny all
reply_header_access X-Cache-Lookup deny all
reply_header_access Server deny all             # 新增：隐藏Squid版本
reply_header_access Via deny all               # 新增：清理响应端Via头

# ===================== Range分段请求（图片下载必备+容错） =====================
range_offset_limit none
cache allow all
# 新增：允许部分内容请求（适配断点续传）
partial_http_requests allow all

# ===================== 访问控制（安全强化） =====================
acl SSL_ports port 443
acl Safe_ports port 80 443 8080 8443
# 核心优化：先拒绝不安全端口，再允许安全端口（逻辑更严谨）
http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports  # 新增：拒绝非443端口的CONNECT请求（防滥用）
# 保留：允许所有IP访问（适配公网代理场景）
http_access allow all
# 兜底：拒绝所有未匹配的请求（安全最佳实践）
http_access deny all

# ===================== 网络优化（适配Pod DNS+超时容错） =====================
# 核心优化：优先使用Pod内DNS（/etc/resolv.conf），备用阿里云DNS
dns_nameservers /etc/resolv.conf 223.5.5.5 223.6.6.6
dns_timeout 8 seconds
# 优化：TCP连接超时（适配弱网/慢请求）
connect_timeout 15 seconds
read_timeout 60 seconds
request_timeout 30 seconds  # 新增：请求整体超时（避免僵死连接）
client_lifetime 3600 seconds  # 新增：客户端长连接超时（防资源占用）
# 优化：禁用SNI检查（部分老旧服务无SNI，避免访问失败）
ssl_unclean_shutdown on
ssl_bump none  # 纯转发代理，无需SSL解密（提升性能）

# ===================== 日志配置（Docker/Pod易排查+性能） =====================
# 核心优化：日志输出到stdout（Docker logs可直接查看，无需进容器）
access_log stdio:/dev/stdout squid
cache_log stdio:/dev/stdout
cache_store_log stdio:/dev/stdout
# 优化：关闭日志轮转（Docker/Pod由日志采集系统处理，避免文件膨胀）
logfile_rotate 0
# 优化：调试级别（生产环境改为1，避免日志刷屏；调试时可改为9）
debug_options ALL,1
# 新增：记录客户端IP（便于排查滥用，但不暴露到Header）
logformat combined "%h %l %u %t \"%r\" %>s %b \"%{Referer}i\" \"%{User-Agent}i\""
access_log stdio:/dev/stdout combined

# ===================== Docker/Pod 特有优化 =====================
# 禁用守护进程（强制前台运行，Docker/Pod必备）
daemon off
# 禁用PID文件（避免PID冲突，适配前台运行）
pid_filename none
# 优化：文件描述符限制（Pod内默认偏小，提升并发）
max_filedescriptors 65535
# 优化：关闭未使用的功能（减少内存占用）
ftpSupport off
gopherSupport off
sslcrtd_program none
